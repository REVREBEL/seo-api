upstream api_backend {
    ip_hash;
    keepalive 120;
    server 127.0.0.1:3000;
}

upstream mcp_backend {
    ip_hash;
    keepalive 120;
    server 127.0.0.1:3010;
}

server {
    listen 80;
    listen [::]:80;
    server_name seo-api.revrebel.io;

    # A clean, global redirect without any 'if' statements
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name seo-api.revrebel.io;

    ssl_certificate /etc/letsencrypt/live/revrebel.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/revrebel.io/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/revrebel.io/chain.pem;

    # Enforce the rate limit zone
    # burst=20 allows a temporary buffer of 20 requests above the normal rate
    # nodelay processes the burst requests instantly instead of queuing them

    limit_req zone=api_limit burst=20 nodelay;

    client_max_body_size 2m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    proxy_connect_timeout 120;
    proxy_send_timeout 120;
    proxy_read_timeout 120;

    # Health check for the main API
    location = /health {
        proxy_pass http://api_backend;
        access_log off;
        log_not_found off;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check for the MCP wrapper service
    location = /mcp/health {
        proxy_pass http://mcp_backend/health;
        access_log off;
        log_not_found off;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /mcp {
        proxy_pass http://mcp_backend/mcp;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
    }

    location / {
        proxy_pass http://api_backend;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ /\.(?!well-known) {
        deny all;
        return 404;
    }
}
